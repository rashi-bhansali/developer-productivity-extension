<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevInks - Notes Dashboard</title>
  <link rel="icon" href="assets/DevInks.png" type="image/png">
  <link rel="stylesheet" href="styles/stylesheet.css">
  <link rel="stylesheet" href="styles/dashboard.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script type="module" src="js/dashboard.js"></script>
</head>
<body>
  <div id="container">
    <header>
      <div class="logo">
        <img src="assets/logo-light.png" alt="DevInks Logo" class="logo-image">
      </div>
    </header>

    <main class="dashboard-content">
      <div class="dashboard-header">
        <h2 class="dashboard-title">Your Notes <span class="highlight">Across the Web</span></h2>
        <p class="dashboard-subtitle">All your notes, every website, one place.</p>
      </div>

      <div id="notes-list"></div>

      <div id="empty-state" class="empty-state" style="display: none;">
        <i class="fa-regular fa-note-sticky empty-icon"></i>
        <p>No notes yet.</p>
        <p class="empty-sub">Open any webpage and start writing in DevInks.</p>
      </div>
    </main>
  </div>
</body>
</html>
